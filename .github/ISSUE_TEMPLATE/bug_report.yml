# Please ensure the link in the Studio configuration is updated if renaming this file!
name: Report a bug
description: Create a report to help us improve the fork
body:
  - type: markdown
    attributes:
      value: |
        Hi! Thank you for helping improve this community fork. Before you submit, please verify the following:

        - I am using the latest release of this repository (`d11f`).
        - I have verified the issue persists in a clean local deployment.

        *Note: If you have tested this behavior against other environments (like stock Directus v11 or v12), feel free to include those observations below! Our maintainers will process all reports using standard clean-room validation.*

  - type: textarea
    attributes:
      label: Describe the Bug Symptom
      description: A clear and concise description of the functional failure observed in your running instance.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: |
        Provide clear steps to reproduce the behavior locally. Include browser console logs, server stack traces, database engines, or minimal schema snippets exported from your local Settings matrix.
    validations:
      required: true

  - type: input
    attributes:
      label: d11f Fork Version
      placeholder: v11.17.4-patch.x
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Hosting Strategy
      options:
        - Self-Hosted (Docker Image)
        - Self-Hosted (Custom Source Node Runtime)
    validations:
      required: true

  - type: input
    attributes:
      label: Database Vendor & Version
      description: Example: PostgreSQL 16, MySQL 8.0, SQLite.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        *Internal Note: Maintainers will assign a unique mapping token `Ref: D11F-XXXX` upon internal triage.*
