title: 'Feature Proposal - Core Scope Guidelines'
labels:
  - feature-proposal
body:
  - type: markdown
    attributes:
      value: |
        **Welcome! We invite community developers to help expand this fork.**

        `d11f` is an independent, community-driven ecosystem built on the standard v11 baseline. We love original feature ideas, performance tunings, and DX enhancements!

        *Note: If your idea is inspired by or brings functional parity with features seen in newer ecosystem variants (like v12), you are absolutely welcome to share it! Our internal team will manage the architectural triage using standard clean-room validation.*

  - type: textarea
    id: proposal-desc
    attributes:
      label: 'Feature Description'
      placeholder:
        'Describe your feature concept, why it helps, and how it can be built or expanded natively from our current
        codebase...'
    validations:
      required: true

  - type: checkboxes
    id: compliance-agree
    attributes:
      label: 'Developer Submission Note'
      options:
        - label:
            'I understand this feature will be built as an independent, un-gated open extension available to all users
            equally.'
          required: true
